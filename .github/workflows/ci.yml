name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit

      - name: Detect file changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            CHANGED="No specific file changes detected"
          fi
          CHANGED_SINGLE_LINE=$(echo "$CHANGED" | tr '\n' ',' | sed 's/,$//')
          echo "changed_files=$CHANGED_SINGLE_LINE" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.EMAIL_USER}}
          password: ${{secrets.EMAIL_PASS}}
          subject: "Code changed in ${{github.repository}}"
          to: ${{secrets.EMAIL_USER}}
          from: ${{secrets.EMAIL_USER}}
          body: |
            Hi,

            A change was pushed to your repository!

            Pusher   : ${{github.actor}}
            Branch   : ${{github.ref_name}}
            Commit   : ${{github.sha}}

            Files changed:
            ${{steps.changes.outputs.changed_files}}

            Link: ${{github.server_url}}/${{github.repository}}/commit/${{github.sha}}