name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # ← IMPORTANT: fetches previous commit too

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit

      - name: Detect file changes
        id: changes
        run: |
          echo "Checking for changes..."
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "changed_files=No specific file changes detected" >> $GITHUB_OUTPUT
          else
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Repository Changes: ${{ github.event_name }} on ${{ github.ref }}"
          to: ${{ secrets.EMAIL_USER }}
          from: ${{ secrets.EMAIL_USER }}
          body: |
            Hello,

            A change was made to your repository!

            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ github.ref }}

            Files Changed:
            ${{ steps.changes.outputs.changed_files }}

            View changes: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}